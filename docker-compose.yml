version: '3.8'

services:
    app:
        build: .
        container_name: mailflow-api
        volumes:
            - .:/var/www/app
        depends_on:
            - mysql
            - redis
            - rabbitmq
    mysql:
        image: mysql:8.0
        container_name: mailflow_mysql
        environment:
            MYSQL_DATABASE: mailflow_db
            MYSQL_USER: dev
            MYSQL_PASSWORD: dev
            MYSQL_ROOT_PASSWORD: root
        volumes:
            -   mysql_data:/var/lib/mysql
        ports:
            -   "3306:3306"

    redis:
        image: redis:7-alpine
        container_name: mailflow_redis
        ports:
            -   "6379:6379"

    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: mailflow_rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: dev
            RABBITMQ_DEFAULT_PASS: dev
        ports:
            - "5672:5672"
            - "15672:15672"


volumes:
    mysql_data:
